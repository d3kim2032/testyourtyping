<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Typing Test</title>
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --caret-color: #e2b714;
            --sub-color: #646669;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            max-width: 850px;
            width: 100%;
            padding: 20px;
        }

        /* Config / Menu Bar */
        .config-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 14px;
            color: var(--sub-color);
        }

        .config-group {
            display: flex;
            gap: 10px;
            background: #2c2e31;
            padding: 5px 15px;
            border-radius: 8px;
        }

        .config-btn {
            cursor: pointer;
            transition: color 0.2s;
            user-select: none;
        }

        .config-btn:hover, .config-btn.active {
            color: var(--main-color);
        }

        /* Stats Display */
        .stats-bar {
            display: flex;
            gap: 30px;
            font-size: 24px;
            color: var(--main-color);
            margin-bottom: 10px;
            height: 35px;
        }

        /* Words Display Box */
        .words-container {
            position: relative;
            font-size: 24px;
            line-height: 40px;
            height: 120px; /* Exactly 3 lines */
            overflow: hidden;
            word-break: break-word;
            color: var(--sub-color);
            user-select: none;
        }

        .words-text-wrapper {
            position: relative;
            transition: transform 0.2s ease;
        }

        .word {
            display: inline-flex;
            margin-right: 14px;
            position: relative;
        }

        .letter {
            position: relative;
            display: inline-block;
            width: 14.4px; /* Perfectly aligns caret tracking */
            text-align: center;
        }

        .letter.correct {
            color: var(--text-color);
        }

        .letter.incorrect {
            color: var(--error-color);
            border-bottom: 2px solid var(--error-color);
        }

        /* Smooth Moving Caret/Cursor */
        #caret {
            position: absolute;
            width: 2px;
            height: 28px;
            background-color: var(--caret-color);
            transition: left 0.05s linear, top 0.1s ease;
            animation: blink 1s infinite;
            z-index: 10;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        /* Results Screen */
        .results {
            display: none;
            text-align: center;
        }

        .results h1 {
            color: var(--main-color);
            font-size: 48px;
            margin-bottom: 10px;
        }

        .restart-btn {
            margin-top: 25px;
            background: none;
            border: 2px solid var(--sub-color);
            color: var(--sub-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            color: var(--bg-color);
            background-color: var(--text-color);
            border-color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="container" id="game-box">
    <div class="config-bar" id="config-bar">
        <div class="config-group">
            <span class="config-btn active" id="mode-time" onclick="setMode('time')">time</span>
            <span class="config-btn" id="mode-words" onclick="setMode('words')">words</span>
        </div>
        <div class="config-group" id="mode-options"></div>
    </div>

    <div class="stats-bar">
        <div id="timer-display">30</div>
        <div id="live-wpm" style="display: none;">0 <span>wpm</span></div>
    </div>

    <div class="words-container" onclick="focusInput()">
        <div class="words-text-wrapper" id="words-text">
            <div id="caret"></div>
        </div>
    </div>
</div>

<div class="results" id="results-box">
    <div style="display: flex; justify-content: center; gap: 50px;">
        <div>
            <span>wpm</span>
            <h1 id="final-wpm">0</h1>
        </div>
        <div>
            <span>accuracy</span>
            <h1 id="final-acc">0%</h1>
        </div>
    </div>
    <button class="restart-btn" onclick="resetTest()">Try Again (Esc)</button>
</div>

<input type="text" id="hidden-input" autocomplete="off" autocapitalize="off" spellcheck="false">

<script>
    const wordBank = [
        "the", "be", "to", "of", "and", "a", "in", "that", "have", "i", "it", "for", "not", "on", "with", 
        "he", "as", "you", "do", "at", "this", "but", "his", "by", "from", "they", "we", "say", "her", 
        "she", "or", "an", "will", "my", "one", "all", "would", "there", "their", "what", "so", "up", 
        "out", "if", "about", "who", "get", "which", "go", "me", "when", "make", "can", "like", "time", 
        "no", "just", "him", "know", "take", "people", "into", "year", "your", "good", "some", "could", 
        "them", "see", "other", "than", "then", "now", "look", "only", "come", "its", "over", "think", 
        "also", "back", "after", "use", "two", "how", "our", "work", "first", "well", "way", "even", 
        "new", "want", "because", "any", "these", "give", "day", "most", "us", "school", "friend", 
        "family", "study", "learn", "science", "history", "math", "book", "read", "write", "computer", 
        "planet", "space", "nature", "music", "sport", "game", "water", "earth", "future", "world"
    ];

    let currentMode = 'time'; 
    let modeValue = 30; 
    let words = [];
    let currentWordIndex = 0;
    let currentLetterIndex = 0;
    let startTime = null;
    let timerInterval = null;
    let isTestRunning = false;
    let totalTypedLetters = 0;

    const hiddenInput = document.getElementById('hidden-input');
    const wordsText = document.getElementById('words-text');
    const caret = document.getElementById('caret');
    const timerDisplay = document.getElementById('timer-display');
    const liveWpm = document.getElementById('live-wpm');

    const optionsTemplates = {
        time: [15, 30, 60],
        words: [10, 25, 50]
    };

    function setMode(mode) {
        currentMode = mode;
        
        // Update mode button active classes
        document.getElementById('mode-time').classList.toggle('active', mode === 'time');
        document.getElementById('mode-words').classList.toggle('active', mode === 'words');
        
        // Render sub-options (numbers)
        const optionsContainer = document.getElementById('mode-options');
        optionsContainer.innerHTML = '';
        
        optionsTemplates[mode].forEach((val, idx) => {
            const btn = document.createElement('span');
            // Default to the middle selection (30 seconds or 25 words)
            btn.className = `config-btn ${idx === 1 ? 'active' : ''}`;
            btn.innerText = val;
            btn.onclick = () => {
                document.querySelectorAll('#mode-options .config-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                modeValue = val;
                resetTest();
            };
            optionsContainer.appendChild(btn);
        });

        modeValue = optionsTemplates[mode][1]; 
        resetTest();
    }

    function generateWords() {
        // Clear out old words without breaking the layout
        const wordElems = wordsText.querySelectorAll('.word');
        wordElems.forEach(e => e.remove());

        words = [];
        // If word mode, use the modeValue (10, 25, 50). If time mode, generate plenty of words.
        const count = currentMode === 'words' ? modeValue : 100;
        
        for (let i = 0; i < count; i++) {
            const randomWord = wordBank[Math.floor(Math.random() * wordBank.length)];
            words.push(randomWord);
        }

        words.forEach(word => {
            const wordDiv = document.createElement('div');
            wordDiv.className = 'word';
            wordDiv.innerHTML = word.split('').map(l => `<span class="letter">${l}</span>`).join('');
            wordsText.appendChild(wordDiv);
        });

        currentWordIndex = 0;
        currentLetterIndex = 0;
        setTimeout(updateCaret, 10);
    }

    function focusInput() {
        hiddenInput.focus();
    }

    function updateCaret() {
        const wordElems = wordsText.querySelectorAll('.word');
        if (wordElems.length === 0 || currentWordIndex >= wordElems.length) return;

        const currentWordElem = wordElems[currentWordIndex];
        const letterElems = currentWordElem.querySelectorAll('.letter');

        let left, top;
        
        if (currentLetterIndex < letterElems.length) {
            const currentLetter = letterElems[currentLetterIndex];
            left = currentLetter.offsetLeft;
            top = currentLetter.offsetTop;
        } else {
            left = currentWordElem.offsetLeft + currentWordElem.offsetWidth;
            top = currentWordElem.offsetTop;
        }

        caret.style.left = `${left}px`;
        caret.style.top = `${top + 6}px`;

        // Handle auto-scrolling row transitions
        if (currentWordElem.offsetTop > 40) {
            wordsText.style.transform = `translateY(-${currentWordElem.offsetTop - 5}px)`;
        } else {
            wordsText.style.transform = `translateY(0px)`;
        }
    }

    hiddenInput.addEventListener('input', (e) => {
        if (!isTestRunning && hiddenInput.value.length > 0) {
            startTest();
        }

        caret.style.animation = 'none';

        const typedVal = hiddenInput.value;
        const wordElems = wordsText.querySelectorAll('.word');
        const currentWordElem = wordElems[currentWordIndex];
        const letterElems = currentWordElem.querySelectorAll('.letter');
        const currentWordStr = words[currentWordIndex];

        totalTypedLetters++;

        // Spacebar tracking
        if (typedVal.endsWith(' ')) {
            if (typedVal.length > 1) {
                // If they skip letters, mark them wrong
                for (let i = currentLetterIndex; i < letterElems.length; i++) {
                    letterElems[i].classList.add('incorrect');
                }
                
                currentWordIndex++;
                currentLetterIndex = 0;
                hiddenInput.value = '';

                // END CONDITION FOR WORD MODE: Checked when completing the final word
                if (currentMode === 'words' && currentWordIndex >= words.length) {
                    endTest();
                    return;
                }
            } else {
                hiddenInput.value = ''; 
            }
            updateCaret();
            caret.style.animation = 'blink 1s infinite';
            return;
        }

        currentLetterIndex = typedVal.length;
        
        for (let i = 0; i < letterElems.length; i++) {
            if (i < typedVal.length) {
                if (typedVal[i] === currentWordStr[i]) {
                    letterElems[i].className = 'letter correct';
                } else {
                    letterElems[i].className = 'letter incorrect';
                }
            } else {
                letterElems[i].className = 'letter';
            }
        }

        // Handle typing too many letters in a word
        if (typedVal.length > currentWordStr.length) {
            let extraSpan = currentWordElem.querySelector('.extra');
            if (!extraSpan) {
                extraSpan = document.createElement('span');
                extraSpan.className = 'letter incorrect extra';
                currentWordElem.appendChild(extraSpan);
            }
            extraSpan.innerText = typedVal.substring(currentWordStr.length);
            currentLetterIndex = currentWordStr.length + 1; 
        } else {
            const extra = currentWordElem.querySelector('.extra');
            if (extra) extra.remove();
        }

        // Live check for finishing word mode on the very last letter (without requiring a final space)
        if (currentMode === 'words' && currentWordIndex === words.length - 1 && typedVal === currentWordStr) {
            currentWordIndex++; // complete the last word
            endTest();
            return;
        }

        updateCaret();
        
        setTimeout(() => {
            if (hiddenInput.value === typedVal) {
                caret.style.animation = 'blink 1s infinite';
            }
        }, 400);
    });

    function startTest() {
        isTestRunning = true;
        startTime = Date.now();
        liveWpm.style.display = 'block';
        document.getElementById('config-bar').style.visibility = 'hidden';

        timerInterval = setInterval(() => {
            const timeElapsed = (Date.now() - startTime) / 1000;
            
            if (currentMode === 'time') {
                const timeLeft = Math.max(0, Math.ceil(modeValue - timeElapsed));
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) endTest();
            } else {
                // In word mode, count UP to track how long it took you
                timerDisplay.innerText = Math.floor(timeElapsed);
            }

            calculateStats(timeElapsed);
        }, 250);
    }

    function calculateStats(timeElapsed) {
        let correctLetters = 0;
        const wordElems = wordsText.querySelectorAll('.word');
        
        for (let i = 0; i <= currentWordIndex; i++) {
            if (!wordElems[i]) break;
            const letters = wordElems[i].querySelectorAll('.letter');
            letters.forEach(l => {
                if (l.classList.contains('correct') && !l.classList.contains('extra')) correctLetters++;
            });
        }

        // Keep fallback safety to prevent division by zero at the first keystroke
        if (timeElapsed < 0.1) timeElapsed = 0.1;

        const calculatedWpm = Math.round((correctLetters / 5) / (timeElapsed / 60));
        liveWpm.innerHTML = `${isNaN(calculatedWpm) || !isFinite(calculatedWpm) ? 0 : calculatedWpm} <span>wpm</span>`;
        
        return {
            wpm: calculatedWpm,
            correct: correctLetters
        };
    }

    function endTest() {
        clearInterval(timerInterval);
        isTestRunning = false;
        
        const timeElapsed = (Date.now() - startTime) / 1000;
        const finalStats = calculateStats(timeElapsed);

        const allCorrect = finalStats.correct;
        const accuracy = totalTypedLetters > 0 ? Math.round((allCorrect / totalTypedLetters) * 100) : 0;

        document.getElementById('game-box').style.display = 'none';
        document.getElementById('results-box').style.display = 'block';
        document.getElementById('final-wpm').innerText = finalStats.wpm;
        document.getElementById('final-acc').innerText = `${accuracy}%`;
    }

    function resetTest() {
        clearInterval(timerInterval);
        isTestRunning = false;
        startTime = null;
        totalTypedLetters = 0;
        hiddenInput.value = '';
        
        document.getElementById('config-bar').style.visibility = 'visible';
        document.getElementById('game-box').style.display = 'block';
        document.getElementById('results-box').style.display = 'none';
        liveWpm.style.display = 'none';
        
        timerDisplay.innerText = currentMode === 'time' ? modeValue : 0;
        wordsText.style.transform = `translateY(0px)`;
        
        generateWords();
        focusInput();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            resetTest();
        } else {
            if (document.getElementById('game-box').style.display !== 'none') {
                focusInput();
            }
        }
    });

    // Run layout initializer on start
    setMode('time');
</script>
</body>
</html>
